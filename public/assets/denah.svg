<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" style="font-family:Inter,sans-serif;">
  <!-- Background -->
  <rect width="900" height="600" fill="#F5F7FB" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#14489A">DENAH LOKASI PT PLN (PERSERO)</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#5B6577">Unit Pelaksana Pelayanan Pelanggan — Layout &amp; Jalur Evakuasi</text>
  
  <!-- Outer building wall -->
  <rect x="60" y="80" width="780" height="460" fill="white" stroke="#14489A" stroke-width="3" rx="4"/>
  
  <!-- === LANTAI BAWAH === -->
  <!-- Lobby -->
  <rect x="60" y="80" width="200" height="160" fill="#EBF3FF" stroke="#14489A" stroke-width="1.5"/>
  <text x="160" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#14489A">LOBBY</text>
  <text x="160" y="172" text-anchor="middle" font-size="10" fill="#5B6577">Pintu Utama</text>
  
  <!-- Customer Service -->
  <rect x="260" y="80" width="220" height="160" fill="#FFF8E6" stroke="#F5A623" stroke-width="1.5"/>
  <text x="370" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#9a6a05">CUSTOMER SERVICE</text>
  <text x="370" y="168" text-anchor="middle" font-size="10" fill="#5B6577">Layanan Pelanggan</text>
  
  <!-- Ruang Tunggu -->
  <rect x="480" y="80" width="180" height="160" fill="#E8F6F0" stroke="#1c7a43" stroke-width="1.5"/>
  <text x="570" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#1c7a43">RUANG TUNGGU</text>
  <text x="570" y="172" text-anchor="middle" font-size="10" fill="#5B6577">Kapasitas 30 orang</text>
  
  <!-- Toilet -->
  <rect x="660" y="80" width="180" height="160" fill="#F0F0F0" stroke="#888" stroke-width="1.5"/>
  <text x="750" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#555">TOILET</text>

  <!-- Corridor horizontal -->
  <rect x="60" y="240" width="780" height="40" fill="#E4E8EF" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#888">— KORIDOR UTAMA —</text>

  <!-- === LANTAI TENGAH === -->
  <!-- Ruang Administrasi -->
  <rect x="60" y="280" width="270" height="160" fill="#F0F4FF" stroke="#14489A" stroke-width="1.5"/>
  <text x="195" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#14489A">RUANG ADMINISTRASI</text>
  <text x="195" y="373" text-anchor="middle" font-size="10" fill="#5B6577">Keuangan &amp; SDM</text>
  
  <!-- Ruang Teknis -->
  <rect x="330" y="280" width="260" height="160" fill="#FFF0F0" stroke="#B42323" stroke-width="1.5"/>
  <text x="460" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#B42323">RUANG TEKNIS</text>
  <text x="460" y="373" text-anchor="middle" font-size="10" fill="#5B6577">Operasi &amp; Pemeliharaan</text>
  
  <!-- Ruang Rapat -->
  <rect x="590" y="280" width="250" height="160" fill="#F5F0FF" stroke="#7048b3" stroke-width="1.5"/>
  <text x="715" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#7048b3">RUANG RAPAT</text>
  <text x="715" y="373" text-anchor="middle" font-size="10" fill="#5B6577">Kapasitas 20 orang</text>

  <!-- Corridor horizontal 2 -->
  <rect x="60" y="440" width="780" height="30" fill="#E4E8EF" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#888">— KORIDOR BELAKANG —</text>

  <!-- === AREA BAWAH === -->
  <!-- Area Parkir -->
  <rect x="60" y="470" width="400" height="70" fill="#E8F6F0" stroke="#1c7a43" stroke-width="1.5"/>
  <text x="260" y="510" text-anchor="middle" font-size="13" font-weight="600" fill="#1c7a43">AREA PARKIR KARYAWAN</text>
  
  <!-- Gudang / Logistik -->
  <rect x="460" y="470" width="380" height="70" fill="#FFF8E6" stroke="#F5A623" stroke-width="1.5"/>
  <text x="650" y="510" text-anchor="middle" font-size="13" font-weight="600" fill="#9a6a05">GUDANG &amp; LOGISTIK K3</text>

  <!-- === SYMBOLS === -->
  <!-- Pintu Masuk Utama (bawah) -->
  <rect x="195" y="537" width="80" height="18" fill="#14489A" rx="4"/>
  <text x="235" y="550" text-anchor="middle" font-size="10" font-weight="700" fill="white">PINTU MASUK</text>
  <polygon points="235,533 220,540 250,540" fill="#14489A"/>

  <!-- APAR markers (merah) -->
  <circle cx="100" cy="262" r="9" fill="#B42323"/>
  <text x="100" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>
  <circle cx="450" cy="262" r="9" fill="#B42323"/>
  <text x="450" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>
  <circle cx="800" cy="262" r="9" fill="#B42323"/>
  <text x="800" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>
  <circle cx="100" cy="452" r="9" fill="#B42323"/>
  <text x="100" y="456" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>
  <circle cx="800" cy="452" r="9" fill="#B42323"/>
  <text x="800" y="456" text-anchor="middle" font-size="9" font-weight="700" fill="white">A</text>

  <!-- P3K markers (hijau) -->
  <rect x="238" y="253" width="18" height="18" fill="#1c7a43" rx="3"/>
  <text x="247" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="white">+</text>
  <rect x="590" y="253" width="18" height="18" fill="#1c7a43" rx="3"/>
  <text x="599" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="white">+</text>

  <!-- Titik Kumpul (kuning) -->
  <polygon points="450,575 430,560 470,560" fill="#FFC20E" stroke="#9a6a05" stroke-width="1.5"/>
  <text x="450" y="598" text-anchor="middle" font-size="11" font-weight="700" fill="#9a6a05">★ TITIK KUMPUL</text>

  <!-- Jalur Evakuasi arrows -->
  <!-- Left exit arrow -->
  <line x1="120" y1="262" x2="62" y2="262" stroke="#FFC20E" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- Right exit arrow -->
  <line x1="780" y1="262" x2="838" y2="262" stroke="#FFC20E" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Down to kumpul -->
  <line x1="450" y1="540" x2="450" y2="557" stroke="#FFC20E" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- === LEGEND BOX === -->
  <rect x="62" y="82" width="0" height="0" fill="none"/>

  <!-- Legenda di pojok kanan bawah area luar -->
  <rect x="630" y="555" width="210" height="40" fill="white" stroke="#E4E8EF" stroke-width="1" rx="6"/>
  <circle cx="650" cy="570" r="7" fill="#B42323"/>
  <text x="663" y="574" font-size="10" fill="#333">A = APAR</text>
  <rect x="695" y="563" width="14" height="14" fill="#1c7a43" rx="2"/>
  <text x="714" y="574" font-size="10" fill="#333">+ = P3K</text>
  <polygon points="765,576 755,568 775,568" fill="#FFC20E" stroke="#9a6a05" stroke-width="1"/>
  <text x="780" y="574" font-size="10" fill="#333">Kumpul</text>
  <line x1="645" y1="586" x2="665" y2="586" stroke="#FFC20E" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="670" y="590" font-size="10" fill="#333">Jalur Evakuasi</text>
</svg>
